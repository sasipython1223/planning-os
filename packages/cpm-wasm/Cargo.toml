[package]
name = "cpm-wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
cpm-kernel = { path = "../cpm-kernel" }
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"

[dev-dependencies]
wasm-bindgen-test = "0.3"
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
